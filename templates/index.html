<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Care Chatbot</title>
  <style>
    :root {
      --primary: #2d6a4f;
      --secondary: #95d5b2;
      --bg: #f4fbf7;
      --text: #1b4332;
      --muted: #52796f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .chat-app {
      width: 100%;
      max-width: 760px;
      background: white;
      border: 1px solid #d8f3dc;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(45, 106, 79, 0.12);
      overflow: hidden;
    }

    .header {
      background: var(--primary);
      color: #fff;
      padding: 14px 16px;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 65vh;
    }

    .message-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 88%;
    }

    .message-wrap.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-wrap.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: var(--secondary);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .sources details {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .sources summary {
      cursor: pointer;
      user-select: none;
    }

    .sources ul {
      margin: 6px 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .composer {
      display: flex;
      gap: 8px;
      border-top: 1px solid #d8f3dc;
      padding: 12px;
      background: #fff;
    }

    .composer input {
      flex: 1;
      border: 1px solid #b7e4c7;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      font-size: 0.96rem;
    }

    .composer button {
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .composer button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(45, 106, 79, 0.25);
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <div class="header">Plant Care Assistant</div>
    <div id="messages" class="messages">
      <div class="message-wrap bot">
        <div class="bubble bot">Hi! Ask me anything about watering, light, soil, pests, and more.</div>
      </div>
    </div>
    <div class="composer">
      <input id="messageInput" type="text" placeholder="Type your plant care question..." />
      <button id="sendButton" type="button">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function createMessage(content, sender, sources = []) {
      const wrap = document.createElement("div");
      wrap.className = `message-wrap ${sender}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${sender}`;
      bubble.textContent = content;
      wrap.appendChild(bubble);

      if (sender === "bot") {
        const sourceBox = document.createElement("div");
        sourceBox.className = "sources";

        const details = document.createElement("details");
        const summary = document.createElement("summary");
        summary.textContent = "Sources used";
        details.appendChild(summary);

        const list = document.createElement("ul");
        if (sources.length === 0) {
          const item = document.createElement("li");
          item.textContent = "No context chunks were retrieved.";
          list.appendChild(item);
        } else {
          sources.forEach((source) => {
            const item = document.createElement("li");
            item.textContent = source;
            list.appendChild(item);
          });
        }

        details.appendChild(list);
        sourceBox.appendChild(details);
        wrap.appendChild(sourceBox);
      }

      messagesEl.appendChild(wrap);
      scrollToBottom();
    }

    function createLoadingBubble() {
      const wrap = document.createElement("div");
      wrap.className = "message-wrap bot";
      wrap.id = "loadingMessage";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      const spinner = document.createElement("div");
      spinner.className = "spinner";
      bubble.appendChild(spinner);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      scrollToBottom();
    }

    function removeLoadingBubble() {
      const loading = document.getElementById("loadingMessage");
      if (loading) loading.remove();
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      createMessage(message, "user");
      inputEl.value = "";
      sendButton.disabled = true;
      createLoadingBubble();

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        removeLoadingBubble();

        if (!response.ok) {
          createMessage("Sorry, something went wrong. Please try again.", "bot", []);
        } else {
          createMessage(data.response || "No response generated.", "bot", data.sources || []);
        }
      } catch (error) {
        removeLoadingBubble();
        createMessage("Network issue. Please check your connection and try again.", "bot", []);
      } finally {
        sendButton.disabled = false;
        inputEl.focus();
      }
    }

    sendButton.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
